{% extends 'base.html' %}

{% block head %}
    <title>Your Ticket</title>
{% endblock %}

{% block body %}

<div class="container mt-4">

    <div class="card shadow-sm">
        <div class="card-body">

            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">Your Ticket</h4>
                <a href="{{ url_for('views.bookings') }}" class="btn btn-outline-secondary btn-sm">
                    Back
                </a>
            </div>

            <!-- Ticket Details -->
            <div class="mb-3">
                <p><strong>Route:</strong> {{ booking.start }} → {{ booking.destination }}</p>
                <p><strong>Departure:</strong> {{ booking.departure_time }}</p>
                <p><strong>Bus:</strong> {{ booking.bus_number }}</p>
                <p><strong>Seat:</strong> {{ booking.seat_number }}</p>
            </div>

            <hr>

            <!-- QR Code -->
            <div class="text-center">
                <h5 class="mb-3">QR Code</h5>
                <img src="{{ url_for('static', filename='qr_codes/booking_' ~ booking_id ~ '.png') }}"
                     class="img-fluid"
                     style="max-width: 200px;">
            </div>

        </div>
    </div>

</div>

{% endblock %}
