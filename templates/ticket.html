{% extends 'base.html' %}

{% block body %}
<div align="center">
    <h2>Your Ticket</h2>

    <div class="card p-3">
        <p><strong>Route:</strong> {{ booking.start }} → {{ booking.destination }}</p>
        <p><strong>Departure:</strong> {{ booking.departure_time }}</p>
        <p><strong>Bus:</strong> {{ booking.bus_number }}</p>
        <p><strong>Seat:</strong> {{ booking.seat_number }}</p>
    </div>

    <h4 class="mt-3">QR Code</h4>

    <img src="{{ url_for('static', filename='qr_codes/booking_' ~ booking_id ~ '.png') }}" width="200">

</div>

{% endblock %}
