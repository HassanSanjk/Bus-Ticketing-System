{% extends 'base.html' %}

{% block head %}
<title>Add Driver</title>
{% endblock %}

{% block body %}
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Add Driver</h2>
        <a href="{{ url_for('admin.drivers') }}" class="btn btn-outline-secondary btn-sm">Back</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Driver Name</label>
                    <input class="form-control" type="text" name="name" placeholder="Enter driver name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">License Number</label>
                    <input class="form-control" type="text" name="license_number" placeholder="Enter license number" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Phone Number</label>
                    <input class="form-control" type="text" name="phone_number" placeholder="Enter phone number" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Experience Years</label>
                    <input class="form-control" type="number" name="experience" placeholder="Enter years of experience" min="0" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select class="form-control" name="status" required>
                        <option value="">-- Select status --</option>
                        <option value="Available">Available</option>
                        <option value="Unavailable">Unavailable</option>
                    </select>
                </div>

                <button class="btn btn-primary" type="submit">Add Driver</button>

            </form>

        </div>
    </div>

</div>
{% endblock %}
