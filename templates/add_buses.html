{% extends 'base.html' %}

{% block head %}
<title>Add Bus</title>
{% endblock %}

{% block body %}
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Add Bus</h2>
        <a href="{{ url_for('admin.buses') }}" class="btn btn-outline-secondary btn-sm">Back</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="POST">

                <div class="mb-3">
                    <label class="form-label">Bus Number</label>
                    <input class="form-control" type="text" name="bus_number" placeholder="Example: BUS-101" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Number of Seats</label>
                    <input class="form-control" type="number" name="seats_number" placeholder="Example: 40" min="1" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Colour</label>
                    <input class="form-control" type="text" name="colour" placeholder="Example: Blue" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Assigned Driver</label>
                    <select class="form-control" name="driver_id" required>
                        <option value="">-- Select driver --</option>
                        {% for driver in drivers %}
                            <option value="{{ driver.id }}">
                                {{ driver.name }} - {{ driver.status }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <button class="btn btn-primary" type="submit">Add Bus</button>

            </form>

        </div>
    </div>

</div>
{% endblock %}
